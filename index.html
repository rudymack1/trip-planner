<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trip Planner</title>
<style>
:root {
  --bg: #f4f1eb;
  --card: #ffffff;
  --border: #ddd9d0;
  --text: #1a1a18;
  --muted: #6b6760;
  --accent: #a83240;
  --accent-dark: #7a2030;
  --accent-light: #faeaec;
  --warn: #b7650a;
  --warn-bg: #fef6ea;
  --warn-border: #f5d88a;
  --danger: #c0392b;
  --danger-light: #fdf0ee;
  --ok: #1a7a6a;
  --ok-light: #e3f5f2;
  --radius: 12px;
  --radius-sm: 8px;
  --rod: #1a6fa8; --rod-light: #e3f0fa;
  --sheree: #8b3fa8; --sheree-light: #f3e8fa;
  --both: #1a7a6a; --both-light: #e3f5f2;
  --guests: #c07b12; --guests-light: #fef3e2;
  --all4: #555; --all4-light: #f0eff8;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 16px; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 90px; }
.header { background: var(--accent); color: #fff; padding: 20px 16px 16px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .sub { font-size: 13px; opacity: 0.75; margin-top: 3px; }
.nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.nav button { flex: 1; padding: 11px 2px; background: none; border: none; font-size: 12px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
.nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.screen { display: none; padding: 16px; }
.screen.active { display: block; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.sum-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
.sum-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.sum-card .val { font-size: 22px; font-weight: 700; margin-top: 2px; }
.sum-card .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

/* Alert / warn cards */
.warn-card { background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
.warn-card .wt { font-size: 13px; font-weight: 600; color: var(--warn); }
.warn-card .wd { font-size: 12px; color: var(--warn); margin-top: 2px; opacity: 0.85; }

/* Entry cards (list view) */
.entry-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
.entry-card.has-warn { border-color: var(--warn-border); background: var(--warn-bg); }
.entry-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.entry-title { font-weight: 500; font-size: 15px; flex: 1; }
.entry-meta { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
.entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.type-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tb-transport { background: #e3f0fa; color: #1a6fa8; }
.tb-accommodation { background: var(--ok-light); color: var(--ok); }
.tb-activity { background: var(--guests-light); color: var(--guests); }
.tb-other { background: #f1efe8; color: #6b6760; }
.booked-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
.bb-yes { background: var(--ok-light); color: var(--ok); }
.bb-no { background: var(--warn-bg); color: var(--warn); }

/* Section title */
.sec { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin: 20px 0 8px; }

/* Timeline */
.month-hdr { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 0 6px; border-top: 1px solid var(--border); margin-top: 8px; }
.month-hdr:first-child { border-top: none; margin-top: 0; }
.day-row { display: flex; min-height: 32px; }
.day-lbl { width: 44px; flex-shrink: 0; padding: 8px 8px 0 0; font-size: 12px; color: var(--muted); text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
.day-lbl .dn { font-size: 13px; line-height: 1; }
.day-lbl .dw { font-size: 10px; }
.day-lbl.today .dn { color: var(--accent); font-weight: 700; }
.day-entries { flex: 1; border-left: 1px solid var(--border); padding: 4px 0 4px 8px; display: flex; flex-direction: column; gap: 3px; min-height: 32px; }
.bar { border-radius: 6px; padding: 4px 8px; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; gap: 6px; cursor: pointer; }
.bar .bt { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar .bdots { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--ok); }
.dot-warn { background: var(--warn); }
/* Traveller colours */
.tc-rod { background: var(--rod-light); color: var(--rod); }
.tc-sheree { background: var(--sheree-light); color: var(--sheree); }
.tc-both { background: var(--both-light); color: var(--both); }
.tc-guests { background: var(--guests-light); color: var(--guests); }
.tc-all4 { background: var(--all4-light); color: var(--all4); }
/* Warning ghost bar */
.bar-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-border); }
/* Continuation bar */
.bar-cont { opacity: 0.45; }

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* Forms */
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
input[type=text], input[type=number], input[type=date], select, textarea { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; background: var(--card); color: var(--text); -webkit-appearance: none; appearance: none; }
textarea { min-height: 72px; resize: vertical; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.ck-lbl { display: flex; align-items: center; gap: 7px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 10px; cursor: pointer; font-size: 14px; }
.ck-lbl.on { background: var(--ok-light); border-color: var(--ok); color: var(--ok); font-weight: 500; }
.ck-lbl input { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; }
.toggle-row label { margin: 0; font-size: 15px; color: var(--text); font-weight: 400; }
input[type=checkbox].toggle { width: 44px; height: 26px; -webkit-appearance: none; appearance: none; background: var(--border); border-radius: 13px; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
input[type=checkbox].toggle:checked { background: var(--ok); }
input[type=checkbox].toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
input[type=checkbox].toggle:checked::after { left: 21px; }
.person-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; }
.person-card-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.person-card-hdr strong { font-size: 15px; }
.btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-primary:active { background: var(--accent-dark); }
.btn-primary:disabled { opacity: 0.5; }
.btn-secondary { width: 100%; padding: 12px; background: none; color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn-warn { width: 100%; padding: 12px; background: none; color: var(--warn); border: 1px solid var(--warn); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn-danger { width: 100%; padding: 12px; background: none; color: var(--danger); border: 1px solid var(--danger); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn-icon { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 12px; font-size: 20px; cursor: pointer; color: var(--muted); height: 42px; }
.info-box { padding: 14px; background: var(--warn-bg); border-radius: var(--radius-sm); font-size: 13px; color: var(--warn); line-height: 1.6; margin-top: 12px; }
.ok-box { padding: 14px; background: var(--ok-light); border-radius: var(--radius-sm); font-size: 13px; color: var(--ok); line-height: 1.6; margin-top: 12px; }
.danger-box { padding: 14px; background: var(--danger-light); border-radius: var(--radius-sm); font-size: 13px; color: var(--danger); line-height: 1.6; margin-top: 12px; }
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.filter-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; overflow-y: auto; padding: 20px 16px 40px; }
.modal-bg.open { display: block; }
.modal { background: var(--card); border-radius: var(--radius); max-width: 480px; margin: 0 auto; padding: 20px; }
.modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-size: 17px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); padding: 0; line-height: 1; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 11px 20px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }
.empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✈️ Trip Planner</h1>
    <div class="sub" id="hdr-sub">Loading...</div>
  </div>
  <nav class="nav">
    <button class="active" onclick="show('overview')">Overview</button>
    <button onclick="show('timeline')">Timeline</button>
    <button onclick="show('list')">List</button>
    <button onclick="show('setup')">Setup</button>
  </nav>
  <div id="s-overview" class="screen active"><div id="overview-inner"></div></div>
  <div id="s-timeline" class="screen"><div id="timeline-inner"></div></div>
  <div id="s-list" class="screen"><div id="list-inner"></div></div>
  <div id="s-setup" class="screen"><div id="setup-inner"></div></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">Add entry</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORE_KEY = 'trip_planner_v2';
var TYPES = ['Transport','Accommodation','Activity','Other'];
var TYPE_ICONS = { Transport:'🚌', Accommodation:'🏨', Activity:'🎯', Other:'📌' };
var TYPE_CSS = { Transport:'transport', Accommodation:'accommodation', Activity:'activity', Other:'other' };
var SUBTYPES = {
  Transport: ['Flight','Train','Ferry/Boat','Bus/Coach','Car/Transfer','Other'],
  Accommodation: [],
  Activity: ['Meal/Restaurant','Sightseeing','Tour','Show/Event','Day trip','Other'],
  Other: []
};

// ── Storage ──────────────────────────────────────────────────
function load() {
  try { var r = localStorage.getItem(STORE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { entries: [], dismissed: [], tripName: 'Italy & Slovenia 2026',
    travellers: ['Rod','Sheree','Ella','Cait'],
    travellers_full: [] };
}
function save(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
  catch(e) { toast('Storage error'); }
}
var S = load();
var EDIT_ID = null, LIST_FILTER = 'all', ENTRY_TYPE = 'Accommodation';

// ── Date helpers ─────────────────────────────────────────────
function parseDate(s) { if (!s) return null; var p = s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtDate(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtDisplay(s) {
  if (!s) return '';
  var d = parseDate(s);
  if (!d) return s;
  return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
}
function addDays(d,n) { var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function pad(n) { return n<10?'0'+n:''+n; }
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function getRange() {
  if (!S.entries.length) return { start: new Date(2026,8,1), end: new Date(2026,9,31) };
  var dates = [];
  S.entries.forEach(function(e) {
    if (e.startDate) dates.push(parseDate(e.startDate));
    if (e.endDate) dates.push(parseDate(e.endDate));
  });
  var mn = new Date(Math.min.apply(null,dates)), mx = new Date(Math.max.apply(null,dates));
  mn.setDate(mn.getDate()-1); mx.setDate(mx.getDate()+2);
  return { start:mn, end:mx };
}

// ── Traveller colour ─────────────────────────────────────────
function tClass(who) {
  if (!who||!who.length) return 'tc-both';
  var t = S.travellers||[];
  var r=t[0],sh=t[1],el=t[2],ca=t[3];
  var hasR=who.indexOf(r)>=0, hasSh=who.indexOf(sh)>=0;
  var hasG=(el&&who.indexOf(el)>=0)||(ca&&who.indexOf(ca)>=0);
  if (hasR&&hasSh&&hasG) return 'tc-all4';
  if (hasR&&hasSh) return 'tc-both';
  if (hasG&&!hasR&&!hasSh) return 'tc-guests';
  if (hasR&&!hasSh) return 'tc-rod';
  if (hasSh&&!hasR) return 'tc-sheree';
  return 'tc-both';
}

// ── Warning engine ───────────────────────────────────────────
function calcWarnings() {
  var warnings = [];

  S.entries.forEach(function(e) {
    // W1: unbooked entry
    if (!e.booked) {
      warnings.push({ id:'unbooked_'+e.id, entryId:e.id, type:'unbooked',
        title:'Not yet booked',
        detail:(TYPE_ICONS[e.type]||'')+ ' ' +e.title+(e.startDate?' · '+fmtDisplay(e.startDate):''),
        date: e.startDate });
    }

    // W2: one-way transport (Flight or Ferry/Boat subtypes only)
    if (e.type==='Transport' && (e.subtype==='Flight'||e.subtype==='Ferry/Boat')) {
      var windowEnd = e.endDate || e.startDate;
      if (windowEnd) {
        var d3 = fmtDate(addDays(parseDate(windowEnd),3));
        var hasOnward = S.entries.some(function(x) {
          return x.id!==e.id && x.type==='Transport'
            && x.startDate > windowEnd && x.startDate <= d3;
        });
        if (!hasOnward) {
          warnings.push({ id:'oneway_'+e.id, entryId:e.id, type:'oneway',
            title:'No onward transport within 3 days',
            detail:'⛴️/✈️ '+e.title+' ('+esc(e.subtype||'')+') · '+fmtDisplay(e.startDate)+' — no transport leg follows within 3 days',
            date: e.startDate });
        }
      }
    }

    // W3: accommodation with no booked activity
    if (e.type==='Accommodation' && e.startDate && e.endDate) {
      var nights = Math.round((parseDate(e.endDate)-parseDate(e.startDate))/(1000*60*60*24));
      var hasBookedActivity;
      if (nights >= 2) {
        // any booked activity overlapping stay
        hasBookedActivity = S.entries.some(function(a) {
          return a.type==='Activity' && a.booked
            && a.startDate >= e.startDate && a.startDate < e.endDate;
        });
      } else {
        // 1-night: check day before, day of, day after
        var dayBefore = fmtDate(addDays(parseDate(e.startDate),-1));
        var dayAfter = fmtDate(addDays(parseDate(e.startDate),1));
        hasBookedActivity = S.entries.some(function(a) {
          return a.type==='Activity' && a.booked
            && (a.startDate===dayBefore||a.startDate===e.startDate||a.startDate===dayAfter);
        });
      }
      if (!hasBookedActivity) {
        warnings.push({ id:'noactivity_'+e.id, entryId:e.id, type:'noactivity',
          title:'No booked activity at this location',
          detail:'🏨 '+e.title+' · '+fmtDisplay(e.startDate)+' → '+fmtDisplay(e.endDate)+' — '+nights+' night'+(nights!==1?'s':'')+', no booked activity found',
          date: e.startDate });
      }
    }
  });

  // W4: accommodation gap — standalone ghost warnings
  var range = getRange();
  for (var d=new Date(range.start); d<=range.end; d=addDays(d,1)) {
    var ds = fmtDate(d);
    var hasAny = S.entries.some(function(e) {
      return e.startDate<=ds && (e.endDate||e.startDate)>=ds;
    });
    if (!hasAny) continue;
    var hasAccom = S.entries.some(function(e) {
      return e.type==='Accommodation' && e.startDate<=ds && e.endDate>ds;
    });
    if (!hasAccom) {
      warnings.push({ id:'accomgap_'+ds, entryId:null, type:'accomgap',
        title:'No accommodation this night',
        detail:'Night of '+fmtDisplay(ds)+' — travellers have entries nearby but no accommodation covers this night',
        date: ds });
    }
  }

  // W5: dead zones — 2+ consecutive days with nothing
  var deadStart = null;
  for (var d2=new Date(range.start); d2<=range.end; d2=addDays(d2,1)) {
    var ds2 = fmtDate(d2);
    var hasE = S.entries.some(function(e) {
      return e.startDate<=ds2 && (e.endDate||e.startDate)>=ds2;
    });
    if (!hasE) {
      if (!deadStart) deadStart = ds2;
    } else {
      if (deadStart) {
        var prev = fmtDate(addDays(parseDate(ds2),-1));
        if (deadStart !== prev) {
          warnings.push({ id:'deadzone_'+deadStart, entryId:null, type:'deadzone',
            title:'Nothing planned for these days',
            detail:'No entries from '+fmtDisplay(deadStart)+' to '+fmtDisplay(prev),
            date: deadStart });
        }
        deadStart = null;
      }
    }
  }

  // Filter out dismissed (only if the entry still exists / situation unchanged)
  return warnings.filter(function(w) {
    return S.dismissed.indexOf(w.id) < 0;
  });
}

function getEntryWarnings(entryId) {
  return calcWarnings().filter(function(w){ return w.entryId===entryId; });
}

function dismissWarning(wid) {
  if (S.dismissed.indexOf(wid)<0) S.dismissed.push(wid);
  save(S);
  renderAll();
  closeModal();
  toast('Warning dismissed');
}

// When an entry is saved or deleted, remove any dismissed warnings related to it
// so they re-evaluate fresh
function clearDismissedForEntry(entryId) {
  S.dismissed = S.dismissed.filter(function(id){
    return id.indexOf(entryId)<0;
  });
  // also clear structural warnings (accomgap, deadzone) since structure changed
  S.dismissed = S.dismissed.filter(function(id){
    return id.indexOf('accomgap_')<0 && id.indexOf('deadzone_')<0;
  });
}

// ── Render overview ───────────────────────────────────────────
function renderOverview() {
  var all = calcWarnings();
  var unbooked = S.entries.filter(function(e){ return !e.booked; }).length;
  var totalCost = S.entries.reduce(function(s,e){ return s+(parseFloat(e.cost)||0); },0);

  var h = '<div class="summary-grid">';
  h += '<div class="sum-card"><div class="lbl">Entries</div><div class="val">'+S.entries.length+'</div><div class="sub">'+S.entries.filter(function(e){return e.booked;}).length+' confirmed</div></div>';
  h += '<div class="sum-card"><div class="lbl">Warnings</div><div class="val" style="color:'+(all.length>0?'var(--warn)':'var(--ok)')+'">'+all.length+'</div><div class="sub">'+(all.length===0?'All clear ✅':'need attention')+'</div></div>';
  h += '<div class="sum-card"><div class="lbl">To book</div><div class="val" style="color:'+(unbooked>0?'var(--warn)':'var(--ok)')+'">'+unbooked+'</div><div class="sub">'+(unbooked===0?'All booked ✅':'not yet confirmed')+'</div></div>';
  h += '<div class="sum-card"><div class="lbl">Est. cost</div><div class="val" style="font-size:17px">A$'+totalCost.toLocaleString()+'</div><div class="sub">across all entries</div></div>';
  h += '</div>';

  if (all.length > 0) {
    h += '<div class="sec">⚠️ Warnings (tap to dismiss)</div>';
    all.forEach(function(w) {
      h += '<div class="warn-card" onclick="showWarningModal(\''+w.id+'\')">';
      h += '<div class="wt">⚠️ '+esc(w.title)+'</div>';
      h += '<div class="wd">'+esc(w.detail)+'</div>';
      h += '</div>';
    });
  } else if (S.entries.length > 0) {
    h += '<div class="ok-box">✅ No warnings — everything looks good!</div>';
  }

  // Traveller passport cards
  var tf = S.travellers_full || [];
  if (tf.length > 0) {
    h += '<div class="sec">Traveller details</div>';
    tf.forEach(function(tv) {
      h += '<div class="entry-card" style="cursor:default">';
      h += '<div class="entry-card-top"><div class="entry-title">👤 '+esc(tv.name)+(tv.fullName?' — '+esc(tv.fullName):'')+'</div></div>';
      h += '<div class="entry-meta">';
      if (tv.dob) h += '🎂 '+fmtDisplay(tv.dob)+'<br>';
      if (tv.passport) h += '🛂 '+esc(tv.passport);
      if (tv.passportExpiry) h += ' · expires '+fmtDisplay(tv.passportExpiry);
      h += '</div></div>';
    });
  }

  // Upcoming
  var upcoming = S.entries.slice().sort(function(a,b){ return (a.startDate||'').localeCompare(b.startDate||''); }).slice(0,5);
  if (upcoming.length) {
    h += '<div class="sec">Coming up</div>';
    upcoming.forEach(function(e) {
      var ew = getEntryWarnings(e.id);
      h += '<div class="entry-card'+(ew.length?' has-warn':'')+'" onclick="editEntry(\''+e.id+'\')">';
      h += '<div class="entry-card-top"><div class="entry-title">'+(TYPE_ICONS[e.type]||'')+' '+esc(e.title)+'</div>';
      h += '<div class="entry-right"><span class="booked-badge '+(e.booked?'bb-yes':'bb-no')+'">'+(e.booked?'✓ Booked':'! To book')+'</span></div></div>';
      h += '<div class="entry-meta">'+fmtDisplay(e.startDate)+(e.endDate&&e.endDate!==e.startDate?' → '+fmtDisplay(e.endDate):'')+' · '+esc((e.who||[]).join(', '))+'</div>';
      h += '</div>';
    });
  }

  if (S.entries.length === 0) {
    h += '<div class="empty">No entries yet.<br>Tap List → + Add to get started.</div>';
  }

  document.getElementById('overview-inner').innerHTML = h;
}

// ── Render timeline ───────────────────────────────────────────
function renderTimeline() {
  var warnings = calcWarnings();
  var range = getRange();
  var today = fmtDate(new Date());

  // Build ghost warning map by date
  var ghostWarnings = {};
  warnings.forEach(function(w) {
    if (!w.entryId) {
      if (!ghostWarnings[w.date]) ghostWarnings[w.date] = [];
      ghostWarnings[w.date].push(w);
    }
  });

  var h = '<div class="legend">';
  var t = S.travellers||[];
  if (t[0]) h += '<div class="leg-item"><div class="leg-dot" style="background:var(--rod)"></div>'+esc(t[0])+'</div>';
  if (t[1]) h += '<div class="leg-item"><div class="leg-dot" style="background:var(--sheree)"></div>'+esc(t[1])+'</div>';
  if (t[0]&&t[1]) h += '<div class="leg-item"><div class="leg-dot" style="background:var(--both)"></div>Both</div>';
  if (t[2]||t[3]) h += '<div class="leg-item"><div class="leg-dot" style="background:var(--guests)"></div>'+(t[2]||'')+(t[3]?'+'+t[3]:'')+'</div>';
  h += '<div class="leg-item"><div class="leg-dot" style="background:var(--ok);border-radius:50%"></div>Booked</div>';
  h += '<div class="leg-item"><div class="leg-dot" style="background:var(--warn);border-radius:50%"></div>Warning</div>';
  h += '</div>';

  var curMonth = -1;
  for (var d=new Date(range.start); d<=range.end; d=addDays(d,1)) {
    var ds = fmtDate(d);
    if (d.getMonth()!==curMonth) {
      h += '<div class="month-hdr">'+MONTHS[d.getMonth()]+' '+d.getFullYear()+'</div>';
      curMonth = d.getMonth();
    }
    var dayEntries = S.entries.filter(function(e) {
      return e.startDate<=ds && (e.endDate||e.startDate)>=ds;
    });
    h += '<div class="day-row">';
    h += '<div class="day-lbl'+(ds===today?' today':'')+'"><span class="dn">'+d.getDate()+'</span><span class="dw">'+DAYS[d.getDay()]+'</span></div>';
    h += '<div class="day-entries">';

    // Ghost warnings first
    if (ghostWarnings[ds]) {
      ghostWarnings[ds].forEach(function(w) {
        h += '<div class="bar bar-warn" onclick="showWarningModal(\''+w.id+'\')"><span class="bt">⚠️ '+esc(w.title)+'</span></div>';
      });
    }

    dayEntries.forEach(function(e) {
      var isStart = e.startDate===ds;
      var ew = getEntryWarnings(e.id);
      var hasWarn = ew.length>0;
      var tc = hasWarn ? 'bar-warn' : tClass(e.who);
      var dotCls = e.booked ? 'dot-ok' : 'dot-warn';
      h += '<div class="bar '+tc+((!isStart&&!hasWarn)?' bar-cont':'')+'" onclick="'+(hasWarn&&isStart?'showEntryWarnings(\''+e.id+'\')':'editEntry(\''+e.id+'\')')+'">';
      if (isStart) {
        h += '<span class="bt">'+(TYPE_ICONS[e.type]||'')+' '+esc(e.title+(e.subtype?' ('+e.subtype+')':''))+'</span>';
        h += '<div class="bdots"><div class="dot '+dotCls+'"></div>'+(hasWarn?'<span style="font-size:10px;line-height:1">⚠️</span>':'')+'</div>';
      } else {
        h += '<span class="bt" style="'+(hasWarn?'':'opacity:0.5')+'">↳ '+esc(e.title)+'</span>';
      }
      h += '</div>';
    });

    h += '</div></div>';
  }
  if (!S.entries.length) h += '<div class="empty" style="margin-top:16px">No entries yet.</div>';
  document.getElementById('timeline-inner').innerHTML = h;
}

// ── Render list ───────────────────────────────────────────────
function renderList() {
  var filters = ['all'].concat(TYPES);
  var h = '<div class="filter-row">';
  filters.forEach(function(f) {
    h += '<button class="filter-btn'+(LIST_FILTER===f?' on':'')+'" onclick="setFilter(\''+f+'\')">'+(f==='all'?'All':(TYPE_ICONS[f]||'')+' '+f)+'</button>';
  });
  h += '</div>';
  var entries = S.entries.slice().sort(function(a,b){ return (a.startDate||'').localeCompare(b.startDate||''); });
  if (LIST_FILTER!=='all') entries=entries.filter(function(e){ return e.type===LIST_FILTER; });
  if (!entries.length) {
    h += '<div class="empty">No entries'+(LIST_FILTER!=='all'?' of this type':'')+'.</div>';
  } else {
    entries.forEach(function(e) {
      var ew = getEntryWarnings(e.id);
      h += '<div class="entry-card'+(ew.length?' has-warn':'')+'" onclick="editEntry(\''+e.id+'\')">';
      h += '<div class="entry-card-top"><div class="entry-title">'+esc(e.title)+'</div>';
      h += '<div class="entry-right">';
      h += '<span class="type-badge tb-'+(TYPE_CSS[e.type]||'other')+'">'+(TYPE_ICONS[e.type]||'')+' '+e.type+(e.subtype?' · '+e.subtype:'')+'</span>';
      h += '<span class="booked-badge '+(e.booked?'bb-yes':'bb-no')+'">'+(e.booked?'✓ Booked':'! To book')+'</span>';
      h += '</div></div>';
      h += '<div class="entry-meta">';
      if (e.startDate) h += fmtDisplay(e.startDate)+(e.endDate&&e.endDate!==e.startDate?' → '+fmtDisplay(e.endDate):'');
      if (e.who&&e.who.length) h += ' · '+esc(e.who.join(', '));
      if (e.company) h += ' · '+esc(e.company);
      if (e.cost) h += ' · A$'+parseFloat(e.cost).toLocaleString();
      h += '</div>';
      if (e.notes) h += '<div class="entry-meta" style="margin-top:3px;font-style:italic">'+esc(e.notes)+'</div>';
      if (ew.length) h += '<div style="font-size:11px;color:var(--warn);margin-top:5px">⚠️ '+ew.map(function(w){return w.title;}).join(' · ')+'</div>';
      h += '</div>';
    });
  }
  h += '<div class="sec" style="margin-top:20px">Add entry</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">';
  TYPES.forEach(function(ty){
    h += '<button class="btn-secondary" style="margin-top:0" onclick="addEntryOfType(\'' + ty + '\')">' + (TYPE_ICONS[ty]||'') + ' ' + ty + '</button>';
  });
  h += '</div>';
  document.getElementById('list-inner').innerHTML = h;
}

function addTravellerCard() {
  var cards = document.getElementById('traveller-cards');
  var i = cards.children.length;

}

function removeTravellerCard(i) {
  var c = document.getElementById('tcard-'+i); if(c) c.remove();
  renumberCards();
}

function renumberCards() {
  document.querySelectorAll('#traveller-cards .person-card').forEach(function(c,idx){
    c.id='tcard-'+idx;
    var s=c.querySelector('strong'); if(s) s.textContent='Traveller '+(idx+1);
    var b=c.querySelector('button'); if(b) b.setAttribute('onclick','removeTravellerCard('+idx+')');
  });
}

function saveSettings() {
  S.tripName = (document.getElementById('trip-name').value||'').trim()||'Trip Planner';
  var cards = document.querySelectorAll('#traveller-cards .person-card');
  var tf = [];
  cards.forEach(function(c) {
    var name=(c.querySelector('.tv-name').value||'').trim();
    if (!name) return;
    tf.push({ name:name, fullName:(c.querySelector('.tv-fullname').value||'').trim(),
      dob:(c.querySelector('.tv-dob').value||''),
      passport:(c.querySelector('.tv-passport').value||'').trim(),
      passportExpiry:(c.querySelector('.tv-expiry').value||'') });
  });
  S.travellers_full = tf;
  S.travellers = tf.map(function(t){return t.name;});
  save(S); renderAll(); toast('Settings saved!');
}

// ── Warning modals ────────────────────────────────────────────
function showWarningModal(wid) {
  var warnings = calcWarnings();
  var w = warnings.find(function(x){ return x.id===wid; });
  if (!w) return;
  document.getElementById('modal-title').textContent = '⚠️ Warning';
  var h = '<div style="font-size:15px;font-weight:500;margin-bottom:8px">'+esc(w.title)+'</div>';
  h += '<div style="font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6">'+esc(w.detail)+'</div>';
  h += '<button class="btn-warn" onclick="dismissWarning(\''+w.id+'\')">Dismiss this warning</button>';
  h += '<button class="btn-secondary" onclick="closeModal()">Keep warning</button>';
  document.getElementById('modal-body').innerHTML = h;
  document.getElementById('modal-bg').classList.add('open');
}

function showEntryWarnings(entryId) {
  var ew = getEntryWarnings(entryId);
  var e = S.entries.find(function(x){ return x.id===entryId; });
  if (!ew.length) { editEntry(entryId); return; }
  document.getElementById('modal-title').textContent = '⚠️ Warnings for this entry';
  var h = '<div style="font-size:15px;font-weight:500;margin-bottom:12px">'+(e?esc(e.title):'')+'</div>';
  ew.forEach(function(w) {
    h += '<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px">';
    h += '<div style="font-weight:600;color:var(--warn);font-size:13px">'+esc(w.title)+'</div>';
    h += '<div style="font-size:12px;color:var(--warn);margin-top:4px">'+esc(w.detail)+'</div>';
    h += '<button class="btn-warn" style="margin-top:8px;padding:8px" onclick="dismissWarning(\''+w.id+'\')">Dismiss</button>';
    h += '</div>';
  });
  h += '<button class="btn-secondary" onclick="editEntry(\''+entryId+'\')">Edit entry instead</button>';
  h += '<button class="btn-secondary" onclick="closeModal()">Close</button>';
  document.getElementById('modal-body').innerHTML = h;
  document.getElementById('modal-bg').classList.add('open');
}

function addEntry() {

  document.getElementById('modal-body').innerHTML = entryForm(null);
  document.getElementById('modal-bg').classList.add('open');

function editEntry(id) {

  document.getElementById('modal-title').textContent = 'Edit entry';

function closeModal() {

function entryForm(e, forcedType) {

    h += '<label>'+curType+' type</label><select id="ef-subtype">';

    h += '<input type="hidden" id="ef-subtype" value="">';
  }

  h += '<div class="form-group"><label>End date <span style="font-weight:400">(leave blank for single day)</span></label><input type="date" id="ef-end" value="'+esc(e?e.endDate||'':'')+'"></div>';
  h += '<div class="form-group"><label>Who</label><div class="check-grid">';
  t.forEach(function(name) {
    if (!name) return;
    var checked = !e||(e.who&&e.who.indexOf(name)>=0);
    h += '<label class="ck-lbl'+(checked?' on':'')+'"><input type="checkbox" value="'+esc(name)+'"'+(checked?' checked':'')+' onchange="toggleCk(this)">'+esc(name)+'</label>';
  });
  h += '</div></div>';
  h += '<div class="form-group"><label>Company / Provider</label><input type="text" id="ef-company" value="'+esc(e?e.company||'':'')+'"></div>';
  h += '<div class="form-group"><label>Cost (A$)</label><input type="number" id="ef-cost" value="'+esc(e?e.cost||'':'')+'"></div>';
  h += '<div class="form-group"><label>Notes</label><textarea id="ef-notes">'+esc(e?e.notes||'':'')+'</textarea></div>';
  h += '<div class="toggle-row"><label>Booked / confirmed</label><input type="checkbox" class="toggle" id="ef-booked"'+(e&&e.booked?' checked':'')+'></div>';

function saveEntry() {
  var title = (document.getElementById('ef-title').value||'').trim();
  var type = document.getElementById('ef-type').value;
  var subtypeEl = document.getElementById('ef-subtype');
  var subtype = subtypeEl ? subtypeEl.value : '';
  var start = document.getElementById('ef-start').value;
  var end = document.getElementById('ef-end').value || start;
  var who = Array.from(document.querySelectorAll('.ck-lbl input:checked')).map(function(cb){return cb.value;});
  var company = (document.getElementById('ef-company').value||'').trim();
  var cost = document.getElementById('ef-cost').value;
  var notes = (document.getElementById('ef-notes').value||'').trim();
  var booked = document.getElementById('ef-booked').checked;
  if (!title) { toast('Enter a title'); return; }
  if (!start) { toast('Enter a start date'); return; }
  var id = EDIT_ID||('e'+Date.now());
  clearDismissedForEntry(id);
  var entry = { id:id, title:title, type:type, subtype:subtype, startDate:start, endDate:end, who:who, company:company, cost:cost, notes:notes, booked:booked };
  if (EDIT_ID) {
    var idx = S.entries.findIndex(function(x){ return x.id===EDIT_ID; });
    if (idx>=0) S.entries[idx]=entry;
  } else {
    S.entries.push(entry);
  }
  save(S); closeModal(); renderAll();
  toast(EDIT_ID?'Updated!':'Entry added!');
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  clearDismissedForEntry(id);
  S.entries = S.entries.filter(function(e){ return e.id!==id; });
  save(S); closeModal(); renderAll(); toast('Deleted');
}

function setFilter(f) { LIST_FILTER=f; renderList(); }
function toggleCk(cb) { cb.parentElement.classList.toggle('on',cb.checked); }

// ── CSV ───────────────────────────────────────────────────────
function exportCSV() {
  var now=new Date();
  var stamp=now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes());
  var lines=['## SETTINGS','TripName,'+cc(S.tripName||''),'Travellers,'+cc((S.travellers||[]).join(', ')),''];
  lines.push('## TRAVELLERS');
  lines.push('Name,FullName,DOB,Passport,PassportExpiry');
  (S.travellers_full||[]).forEach(function(tv){
    lines.push([cc(tv.name),cc(tv.fullName||''),cc(tv.dob||''),cc(tv.passport||''),cc(tv.passportExpiry||'')].join(','));
  });
  lines.push('');
  lines.push('## ENTRIES');
  lines.push('ID,Title,Type,Subtype,StartDate,EndDate,Who,Company,Cost,Notes,Booked');
  S.entries.forEach(function(e){
    lines.push([cc(e.id),cc(e.title),cc(e.type),cc(e.subtype||''),cc(e.startDate||''),cc(e.endDate||''),cc((e.who||[]).join(', ')),cc(e.company||''),cc(e.cost||''),cc(e.notes||''),e.booked?'true':'false'].join(','));
  });
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='trip_'+stamp+'.csv';
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  toast('Saved: trip_'+stamp+'.csv');
}

function cc(s){ return '"'+String(s).replace(/"/g,'""')+'"'; }

function importCSV(input) {
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try {
      var lines=ev.target.result.split('\n');
      var section='', entries=[], tf=[], settings={};
      for (var i=0;i<lines.length;i++){
        var line=lines[i].trim(); if(!line) continue;
        if (line==='## SETTINGS'){section='settings';continue;}
        if (line==='## TRAVELLERS'){section='travellers';continue;}
        if (line==='## ENTRIES'){section='entries';continue;}
        if (line.startsWith('TripName,')&&section==='settings'){settings.tripName=pcsv(line)[1];continue;}
        if (line.startsWith('Travellers,')&&section==='settings'){settings.travellers=pcsv(line)[1].split(',').map(function(n){return n.trim();}).filter(Boolean);continue;}
        if (line.startsWith('Name,')&&section==='travellers') continue;
        if (line.startsWith('ID,')&&section==='entries') continue;
        if (section==='travellers'){var c=pcsv(line); if(c[0]) tf.push({name:c[0],fullName:c[1]||'',dob:c[2]||'',passport:c[3]||'',passportExpiry:c[4]||''});}
        else if (section==='entries'){var c2=pcsv(line); if(c2[1]) entries.push({id:c2[0]||('e'+Date.now()),title:c2[1],type:c2[2],subtype:c2[3]||'',startDate:c2[4],endDate:c2[5],who:c2[6].split(',').map(function(n){return n.trim();}).filter(Boolean),company:c2[7]||'',cost:c2[8]||'',notes:c2[9]||'',booked:c2[10]==='true'});}
      }
      if (!confirm('Restore '+entries.length+' entries? Replaces all current data.')) return;
      if (settings.tripName) S.tripName=settings.tripName;
      if (settings.travellers) S.travellers=settings.travellers;
      if (tf.length) S.travellers_full=tf;
      S.entries=entries; S.dismissed=[];
      save(S); renderAll(); toast('Restored '+entries.length+' entries!');
    } catch(err){toast('Error: '+err.message);}
  };
  reader.readAsText(file);
}

function pcsv(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur.trim());cur='';}
    else cur+=ch;
  }
  result.push(cur.trim());
  return result;
}

function resetAll(){
  if(!confirm('Delete everything?')) return;
  if(!confirm('Are you sure?')) return;
  S={entries:[],dismissed:[],tripName:S.tripName,travellers:S.travellers,travellers_full:S.travellers_full};
  save(S); renderAll(); toast('Reset complete');
}

// ── Nav ───────────────────────────────────────────────────────
function renderAll(){
  renderOverview(); renderTimeline(); renderList(); renderSetup();
  document.getElementById('hdr-sub').textContent = S.tripName||'Trip Planner';
}

function show(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('s-'+name).classList.add('active');
  ['overview','timeline','list','setup'].forEach(function(t,i){
    if(t===name) document.querySelectorAll('.nav button')[i].classList.add('active');
  });
}

function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2800);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('modal-bg').addEventListener('click',function(ev){if(ev.target===this)closeModal();});

renderAll();
if(!S.entries.length) show('setup');
</script>
